<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#141026" />
      <stop offset="100%" stop-color="#07050d" />
    </radialGradient>
    
    <!-- Neon Gradients -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#00a3b0" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d55" />
      <stop offset="100%" stop-color="#e01e43" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base Card Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="4"/>
  
  <!-- Outer glowing accent ring -->
  <rect x="24" y="24" width="464" height="464" rx="104" stroke="url(#pinkGrad)" stroke-width="2" stroke-opacity="0.25" />

  <!-- The Chart & Music Note Blend Group -->
  <g filter="url(#neonGlow)" transform="translate(10, -10)">
    <!-- Bar 1: Left (Cyan) -->
    <rect x="130" y="280" width="44" height="120" rx="22" fill="url(#cyanGrad)"/>
    
    <!-- Bar 2: Middle (Purple) -->
    <rect x="210" y="200" width="44" height="200" rx="22" fill="url(#purpleGrad)"/>
    
    <!-- Bar 3: Right Stem (Pink) -->
    <rect x="290" y="120" width="44" height="280" rx="22" fill="url(#pinkGrad)"/>
    
    <!-- Music Note Head at the bottom of the stem (tilted) -->
    <ellipse cx="270" cy="380" rx="36" ry="26" transform="rotate(-15 270 380)" fill="url(#pinkGrad)"/>
    
    <!-- Music Note Flag curving to the right from the top stem -->
    <path d="M312 120 C365 120 405 160 405 210 C405 225 395 235 380 235 C365 235 360 225 360 210 C360 178 340 162 312 162 Z" fill="url(#pinkGrad)"/>
    
    <!-- Decorative sound particles -->
    <circle cx="152" cy="240" r="8" fill="#00f0ff" opacity="0.8"/>
    <circle cx="232" cy="150" r="10" fill="#a855f7" opacity="0.8"/>
    <circle cx="380" cy="90" r="12" fill="#ff2d55" opacity="0.8"/>
  </g>
</svg>
